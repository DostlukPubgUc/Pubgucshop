<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DostlukPubgUcShop | Professional v5.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');

        :root {
            --gold: #fbbf24;
            --dark: #020617;
            --glass: rgba(15, 23, 42, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }

        /* --- BAÝLAŞDYRYLAN ANIMASIÝALAR --- */
        
        /* Kartlaryň daşyndaky aýlanyp duran reňkli çyzyk */
        .animated-border-card {
            position: relative;
            background: #0f172a;
            border-radius: 2rem;
            z-index: 1;
            overflow: hidden;
            transition: 0.3s;
        }

        .animated-border-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite;
            z-index: -1;
        }

        .animated-border-card::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #0f172a;
            border-radius: calc(2rem - 3px);
            z-index: -1;
        }

        @keyframes rotate-border {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- OPERATOR ONLINE STYLE --- */
        .op-status {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- TERMINAL & COPY LOGIC --- */
        #paymentModal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 20px;
        }
        
        .terminal-box {
            width: 100%; max-width: 480px; background: #0f172a; 
            border: 2px solid var(--gold); border-radius: 3rem; padding: 30px;
        }

        .copy-item {
            background: #020617; border: 1px solid rgba(255,255,255,0.05);
            padding: 18px; border-radius: 1.2rem; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .btn-copy {
            background: rgba(251, 191, 36, 0.1); color: var(--gold);
            padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: 700;
        }

        /* --- CUSTOM INPUTS --- */
        .pubg-input {
            background: #000; border: 1px solid #334155; color: #fff;
            padding: 20px; border-radius: 1.2rem; width: 100%; text-align: center;
            font-size: 1.2rem; font-family: 'Orbitron', sans-serif;
        }

        .btn-finish {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000; font-weight: 900; width: 100%; padding: 20px;
            border-radius: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[1000] py-5 px-6 bg-[#020617]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-black text-xl"></i>
                </div>
                <div>
                    <h1 class="font-game text-lg font-black text-yellow-500 leading-none">DOSTLUK</h1>
                    <p class="text-[8px] uppercase tracking-[3px] text-gray-500">PUBGUCSHOP PROFESSIONAL</p>
                </div>
            </div>
            
            <div class="op-status flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                OPERATOR ONLINE: 7/24
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-20">
            <h2 class="font-game text-5xl md:text-7xl font-black italic tracking-tighter mb-4 animate__animated animate__fadeInDown">
                DOSTLUK <span class="text-yellow-500">PUBGUCSHOP</span>
            </h2>
            <p class="text-gray-500 text-xs tracking-[4px] uppercase">Siziň ynamly UC dükanyňyz</p>
        </div>

        <div id="uc-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="paymentModal">
        <div class="terminal-box animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-game text-xl text-yellow-500 italic">TÖLEG TERMINALY</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>

            <div class="space-y-4">
                <div class="copy-item">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-500 font-bold uppercase mb-1">Satyjy:</span>
                        <span id="copyName" class="text-sm font-black text-white uppercase">AMAN HAYITMURADOV</span>
                    </div>
                    <button onclick="copyTxt('copyName', 'At göçürildi')" class="btn-copy">GÖÇÜR</button>
                </div>

                <div class="copy-item">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-500 font-bold uppercase mb-1">IBAN Nomer:</span>
                        <span id="copyIban" class="text-sm font-mono font-bold text-yellow-500">TR91 0015 7000 0000 0201 1511 63</span>
                    </div>
                    <button onclick="copyTxt('copyIban', 'IBAN göçürildi')" class="btn-copy">GÖÇÜR</button>
                </div>

                <div class="pt-6 border-t border-white/5">
                    <p class="text-[10px] text-gray-500 text-center font-bold mb-4">PUBG ID BELGIŇIZI ÝAZYŇ</p>
                    <input type="number" id="playerID" placeholder="Meselem: 51234567" class="pubg-input mb-6">
                    
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl mb-6 border border-white/5">
                        <span class="text-[10px] text-gray-500 font-black">SAÝLANAN:</span>
                        <span class="text-xs font-black text-white italic"><span id="selUC">0</span> UC — ₺<span id="selPrice">0</span></span>
                    </div>

                    <button onclick="sendWA()" class="btn-finish">
                        <i class="fa-solid fa-circle-check mr-2"></i> TÖLEG ETDIM
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-16 border-t border-white/5 text-center">
        <p class="text-[10px] text-gray-600 font-bold tracking-[8px] uppercase">© 2026 DOSTLUKPUBGUCSHOP</p>
    </footer>

    <script>
        const ucList = [
            { uc: "60", p: "40,50" },
            { uc: "325", p: "202,50" }, //
            { uc: "660", p: "405,00" },
            { uc: "1.800", p: "1.012,50" },
            { uc: "3.850", p: "2.025,00" },
            { uc: "8.100", p: "4.050,00" },
            { uc: "16.200", p: "8.100,00" },
            { uc: "24.300", p: "12.150,00" },
            { uc: "32.400", p: "16.200,00" },
            { uc: "40.500", p: "20.250,00" }
        ];

        const container = document.getElementById('uc-container');
        ucList.forEach(item => {
            container.innerHTML += `
                <div class="animated-border-card p-10 text-center">
                    <img src="uc.png" class="w-20 h-20 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]" alt="UC">
                    <h4 class="font-game text-2xl font-black text-white mb-2">${item.uc} PUBG UC</h4>
                    <p class="text-[9px] text-gray-500 font-bold tracking-[2px] mb-8 uppercase">Global Fast Transfer</p>
                    <div class="bg-black/50 py-4 rounded-xl mb-8 flex justify-between px-6 border border-white/5">
                        <span class="text-[10px] text-gray-500 font-bold uppercase">Baha:</span>
                        <span class="text-xl font-black text-white italic">₺${item.p}</span>
                    </div>
                    <button onclick="openPayment('${item.uc}', '${item.p}')" class="btn-finish !py-4 !text-xs">
                        <i class="fa-solid fa-cart-plus mr-2"></i> SATYN AL
                    </button>
                </div>
            `;
        });

        let sUC = ""; let sP = "";

        function openPayment(uc, p) {
            sUC = uc; sP = p;
            document.getElementById('selUC').innerText = uc;
            document.getElementById('selPrice').innerText = p;
            document.getElementById('paymentModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function copyTxt(id, msg) {
            const txt = document.getElementById(id).innerText;
            navigator.clipboard.writeText(txt).then(() => {
                alert(msg);
            });
        }

        function sendWA() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { alert("Dogry ID belgiňizi ýazyň!"); return; }
            
            const msg = `Salam! *DostlukPubgUcShop*%0A━━━━━━━━━━━━━━━━━%0A✅ *TÖLEG TASSYKLANDY*%0A📦 Paket: *${sUC} UC*%0A💰 Baha: *₺${sP}*%0A🆔 Player ID: *${id}*%0A━━━━━━━━━━━━━━━━━%0AÇek ugradylýar...`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
