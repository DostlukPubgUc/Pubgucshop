<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dostluk Shop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        
        :root { --gold: #fbbf24; --dark-bg: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark-bg); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }

        /* Professional UC Card */
        .uc-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 2rem;
            border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 1.5rem;
            text-align: center;
            transition: 0.3s;
        }
        
        /* UC Suratyny dikeltmek */
        .uc-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        /* Uly we Professional Düwme */
        .btn-buy {
            width: 100%;
            background: var(--gold);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            padding: 1.25rem;
            border-radius: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
            transition: 0.2s;
        }
        .btn-buy:active { transform: scale(0.95); }

        #paymentModal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .terminal {
            width: 100%; max-width: 420px;
            background: #0f172a; border: 1px solid var(--gold);
            border-radius: 2.5rem; padding: 2.5rem;
        }
    </style>
</head>
<body>

    <div class="w-full bg-slate-950 py-3 border-b border-white/5 text-center">
        <div class="inline-flex items-center gap-2 bg-green-500/10 text-green-500 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            Operator Online: 7/24
        </div>
    </div>

    <nav class="py-8 px-8 flex justify-center items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-bolt text-black"></i>
            </div>
            <h1 class="font-game text-2xl font-black text-yellow-500 italic uppercase">DOSTLUK SHOP</h1>
        </div>
    </nav>

    <main class="py-10 px-6 max-w-7xl mx-auto">
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="paymentModal">
        <div class="terminal">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-game text-md text-yellow-500 italic uppercase">Töleg Terminaly</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-gray-500 text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="bg-black/40 p-4 border border-yellow-500/20 rounded-2xl cursor-pointer" onclick="copyValue('AMAN HAYITMURADOV', 'Adyňyz nusgalandy!')">
                    <span class="text-[9px] text-gray-500 uppercase block mb-1">Resmi Satyjy:</span>
                    <p class="text-white font-bold tracking-wide uppercase">AMAN HAYITMURADOV</p>
                </div>

                <div class="bg-black/40 p-4 border border-yellow-500/20 rounded-2xl cursor-pointer" onclick="copyValue('TR91 0015 7000 0000 0201 1511 63', 'IBAN nusgalandy!')">
                    <span class="text-[9px] text-gray-500 uppercase block mb-1">IBAN Belgi:</span>
                    <p class="text-yellow-500 font-bold text-sm">TR91 0015 7000 0000 0201 1511 63</p>
                </div>

                <input type="number" id="playerID" placeholder="ID belgiňizi ýazyň" class="w-full bg-black border border-white/10 text-white p-5 rounded-2xl text-center font-game text-xl outline-none focus:border-yellow-500 mt-4">
                
                <button onclick="sendWhatsApp()" class="btn-buy mt-2">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <script>
        const inventory = [
            { uc: "60", price: "40,50" }, { uc: "325", price: "202,50" }, { uc: "660", price: "405,00" },
            { uc: "1.800", price: "1.012,50" }, { uc: "3.850", price: "2.025,00" }, { uc: "8.100", price: "4.050,00" },
            { uc: "16.200", price: "8.100,00" }, { uc: "24.300", price: "12.150,00" }, { uc: "40.500", price: "20.250,00" }
        ];

        const market = document.getElementById('market');
        inventory.forEach(item => {
            market.innerHTML += `
                <div class="uc-card">
                    <img src="12140.png" class="uc-image" alt="UC">
                    <h4 class="font-game text-2xl font-black text-white mb-1 italic uppercase">${item.uc} UC</h4>
                    <p class="text-xl font-bold text-white/30 italic mb-6 font-game">₺${item.price}</p>
                    <button onclick="openPay('${item.uc}', '${item.price}')" class="btn-buy">Satyn Al</button>
                </div>
            `;
        });

        let currentUC = ""; let currentPrice = "";
        function openPay(uc, p) { currentUC = uc; currentPrice = p; document.getElementById('paymentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }
        function copyValue(val, msg) { navigator.clipboard.writeText(val).then(() => { alert(msg); }); }

        function sendWhatsApp() {
            const id = document.getElementById('playerID').value;
            // 7 san barlagy
            if(!id || id.length < 7) { 
                alert("ID belgiňizi doly ýazyň!"); 
                return; 
            }
            const msg = `Salam! Dostluk Shop%0A Paket: ${currentUC} UC%0A Baha: ₺${currentPrice}%0A ID: ${id}`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
