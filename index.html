<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DostlukPubgUcShop | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        :root { --gold: #fbbf24; --dark: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        
        /* Github elementlerini gizlemek */
        header, footer, .github-corner, .fork-me { display: none !important; }

        .uc-card { background: #0f172a; border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.3s; position: relative; overflow: hidden; }
        .uc-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        /* Surat bölüminiň dizaýny */
        .uc-img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 1rem; border-radius: 1.5rem; background: rgba(255,255,255,0.02); }
        .uc-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #paymentModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .terminal { width: 100%; max-width: 450px; background: #0f172a; border: 1px solid var(--gold); border-radius: 2.5rem; padding: 30px; position: relative; }
        
        #custom-toast { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 12px 24px; border-radius: 12px;
            font-weight: bold; z-index: 10001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="custom-toast" class="animate__animated">ID belgiňizi barlaň!</div>

    <nav class="fixed top-0 w-full z-[1000] bg-slate-950/90 backdrop-blur-md py-4 px-6 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-black"></i>
                </div>
                <h1 class="font-game text-lg font-black text-yellow-500 italic uppercase">Dostluk</h1>
            </div>
            <div class="bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-2 rounded-full text-[10px] font-bold">
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span> OPERATOR ONLINE: 7/24
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-6 text-center">
        <div class="inline-block px-4 py-1 bg-yellow-500/10 border border-yellow-500/20 rounded-full mb-6">
            <span class="text-[9px] font-black text-yellow-500 tracking-[2px] uppercase">Official Reseller 2026</span>
        </div>
        <h2 class="font-game text-4xl md:text-6xl font-black text-white mb-16 italic uppercase leading-tight">Dostluk<br><span class="text-yellow-500">PubgUcShop</span></h2>
        
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
            </div>
    </section>

    <div id="paymentModal">
        <div class="terminal animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-game text-lg text-yellow-500 italic uppercase">Töleg Terminaly</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-xl text-gray-500"></i></button>
            </div>
            <div class="space-y-3">
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase mb-1">Satyjy:</p>
                    <div class="flex justify-between items-center">
                        <p id="tName" class="text-xs font-black text-white uppercase">AMAN HAYITMURADOV</p>
                        <button onclick="copyToClipboard('tName')" class="text-yellow-500 text-[10px] font-bold">GÖÇÜR</button>
                    </div>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase mb-1">IBAN:</p>
                    <div class="flex justify-between items-center">
                        <p id="tIban" class="text-xs font-mono font-bold text-yellow-500">TR91 0015 7000 0000 0201 1511 63</p>
                        <button onclick="copyToClipboard('tIban')" class="text-yellow-500 text-[10px] font-bold">GÖÇÜR</button>
                    </div>
                </div>
                <input type="number" id="playerID" placeholder="Player ID ýazyň" class="w-full bg-black border border-white/10 text-white p-4 rounded-xl text-center font-game text-lg my-4 focus:border-yellow-500 outline-none transition">
                <button onclick="sendWhatsApp()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-xs shadow-lg shadow-yellow-500/20">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <footer class="py-10 text-center border-t border-white/5">
        <p class="text-[10px] text-gray-700 font-black tracking-[8px] uppercase">DostlukPubgUcShop Global 2026</p>
    </footer>

    <script>
        const inventory = [
            { uc: "60", price: "40,50", img: "uc.png" }, { uc: "325", price: "202,50", img: "uc.png" }, 
            { uc: "660", price: "405,00", img: "uc.png" }, { uc: "1.800", price: "1.012,50", img: "uc.png" }, 
            { uc: "3.850", price: "2.025,00", img: "uc.png" }, { uc: "8.100", price: "4.050,00", img: "uc.png" },
            { uc: "16.200", price: "8.100,00", img: "uc.png" }, { uc: "24.300", price: "12.150,00", img: "uc.png" }, 
            { uc: "40.500", price: "20.250,00", img: "uc.png" }
        ];

        const market = document.getElementById('market');
        inventory.forEach(item => {
            market.innerHTML += `
                <div class="uc-card p-8 text-center animate__animated animate__fadeInUp">
                    <div class="uc-img-container">
                        <img src="${item.img}" alt="UC" class="uc-img" onerror="this.src='https://icons.iconarchive.com/icons/custom-icon-design/pretty-office-11/256/gem-icon.png'">
                    </div>
                    <h4 class="font-game text-xl font-bold text-white mb-6">${item.uc} PUBG UC</h4>
                    <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl mb-6">
                        <span class="text-[10px] text-gray-500">BAHA:</span>
                        <span class="text-lg font-black text-white italic">₺${item.price}</span>
                    </div>
                    <button onclick="openPay('${item.uc}', '${item.price}')" class="w-full bg-white/5 hover:bg-yellow-500 hover:text-black text-white border border-white/10 py-3 rounded-xl text-[10px] font-black transition">SATYN AL</button>
                </div>
            `;
        });

        let currentUC = ""; let currentPrice = "";
        function openPay(uc, p) { currentUC = uc; currentPrice = p; document.getElementById('paymentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = msg; toast.style.display = 'block';
            toast.classList.add('animate__fadeInDown');
            setTimeout(() => {
                toast.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
                setTimeout(() => { toast.style.display = 'none'; toast.classList.remove('animate__fadeOutUp'); }, 500);
            }, 2500);
        }

        function copyToClipboard(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            showToast("GÖÇÜRILDI!");
        }

        function sendWhatsApp() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { showToast("ID BELGIŇIZI BARLAŇ!"); return; }
            const msg = `Salam! *DostlukPubgUcShop*%0A━━━━━━━━━━━━━━━━━%0A📦 Paket: *${currentUC} UC*%0A💰 Baha: *₺${currentPrice}*%0A🆔 Player ID: *${id}*%0A━━━━━━━━━━━━━━━━━`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
