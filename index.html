<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DostlukPubgUcShop | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        :root { --gold: #fbbf24; --dark: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        
        /* UC Kartlary */
        .uc-card { background: #0f172a; border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.05); padding: 30px; text-align: center; }
        
        /* SURAT Dizaýny */
        .uc-img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .uc-img { max-width: 150px; height: auto; filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.2)); }

        /* FAQ */
        .faq-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 20px; margin-bottom: 15px; }
        
        /* Modal */
        #paymentModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .terminal { width: 100%; max-width: 450px; background: #0f172a; border: 2px solid var(--gold); border-radius: 3rem; padding: 35px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1000] bg-slate-950/90 backdrop-blur-md py-5 px-8 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-black text-xl"></i>
                </div>
                <h1 class="font-game text-xl font-black text-yellow-500 italic uppercase">DOSTLUK</h1>
            </div>
            <div class="bg-green-500/10 text-green-500 border border-green-500/20 px-5 py-2.5 rounded-full text-[11px] font-black">
                OPERATOR ONLINE: 7/24
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-8 text-center">
        <h2 class="font-game text-5xl font-black text-white italic uppercase mb-16">Dostluk<br><span class="text-yellow-500">PubgUcShop</span></h2>
        
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>
    </section>

    <section class="py-20 px-8 max-w-4xl mx-auto">
        <h3 class="font-game text-2xl text-center text-yellow-500 mb-12 italic uppercase">Köp Soralýan Soraglar</h3>
        <div class="faq-item">
            <p class="text-yellow-500 font-bold mb-2">1. UC näçe wagtda gelýär?</p>
            <p class="text-gray-400 text-sm">Töleg tassyklanyp, 5-15 minudyň dowamynda hesabyňyza geçirilýär.</p>
        </div>
        <div class="faq-item">
            <p class="text-yellow-500 font-bold mb-2">2. ID belgiňiz dogry bolmalymy?</p>
            <p class="text-gray-400 text-sm">Hawa, ID belgiňizi barlaň!</p>
        </div>
    </section>

    <div id="paymentModal">
        <div class="terminal">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-game text-lg text-yellow-500 italic uppercase">Töleg Terminaly</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-xl text-gray-500"></i></button>
            </div>
            <div class="space-y-4">
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 text-left">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">SATYJY:</p>
                    <p class="text-sm font-black text-white">AMAN HAYITMURADOV</p>
                </div>
                <input type="number" id="playerID" placeholder="ID belgiňizi ýazyň" class="w-full bg-black/60 border border-white/10 text-white p-5 rounded-2xl text-center font-game text-xl outline-none focus:border-yellow-500">
                <button onclick="sendWhatsApp()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <script>
        // Siziň ýüklän täze surat salgyňyz
        const ucImage = "https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/516479509_1314959147297515_1216252998592852072_n.png";

        const inventory = [
            { uc: "60", price: "40,50" }, { uc: "325", price: "202,50" }, { uc: "660", price: "405,00" },
            { uc: "1.800", price: "1.012,50" }, { uc: "3.850", price: "2.025,00" }, { uc: "8.100", price: "4.050,00" },
            { uc: "16.200", price: "8.100,00" }, { uc: "24.300", price: "12.150,00" }, { uc: "40.500", price: "20.250,00" }
        ];

        const market = document.getElementById('market');
        inventory.forEach(item => {
            market.innerHTML += `
                <div class="uc-card">
                    <div class="uc-img-container">
                        <img src="${ucImage}" alt="UC" class="uc-img" onerror="this.src='https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/uc.png'">
                    </div>
                    <h4 class="font-game text-2xl font-black text-white mb-6 italic">${item.uc} PUBG UC</h4>
                    <div class="bg-black/40 p-4 rounded-2xl mb-8 border border-white/5 flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-black">BAHA:</span>
                        <span class="text-xl font-black text-white italic">₺${item.price}</span>
                    </div>
                    <button onclick="openPay('${item.uc}', '${item.price}')" class="w-full bg-white/5 hover:bg-yellow-500 hover:text-black text-white border border-white/10 py-4 rounded-2xl text-[11px] font-black transition uppercase">SATYN AL</button>
                </div>
            `;
        });

        let currentUC = ""; let currentPrice = "";
        function openPay(uc, p) { currentUC = uc; currentPrice = p; document.getElementById('paymentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        function sendWhatsApp() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { alert("ID belgiňizi barlaň!"); return; }
            const msg = `Salam! DostlukPubgUcShop%0A Paket: ${currentUC} UC%0A Baha: ₺${currentPrice}%0A ID: ${id}`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
