<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DostlukPubgUcShop | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        :root { --gold: #fbbf24; --dark: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        
        /* UC Kartlarynyň Dizaýny */
        .uc-card { background: #0f172a; border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.3s; position: relative; overflow: hidden; padding: 30px; text-align: center; }
        .uc-card:hover { border-color: var(--gold); transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Surat we Effekti */
        .uc-img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: rgba(255,255,255,0.02); border-radius: 2rem; }
        .uc-img { max-width: 130px; height: auto; filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.3)); transition: 0.5s; }
        .uc-card:hover .uc-img { transform: scale(1.1) rotate(5deg); }

        /* Modal we Terminal */
        #paymentModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .terminal { width: 100%; max-width: 450px; background: #0f172a; border: 2px solid var(--gold); border-radius: 3rem; padding: 35px; position: relative; box-shadow: 0 0 50px rgba(251, 191, 36, 0.1); }
        
        /* Toast Bildirişi */
        #custom-toast { display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 15px 30px; border-radius: 15px; z-index: 10001; font-weight: 900; letter-spacing: 1px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="custom-toast" class="animate__animated"></div>

    <nav class="fixed top-0 w-full z-[1000] bg-slate-950/90 backdrop-blur-md py-5 px-8 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center shadow-lg shadow-yellow-500/20">
                    <i class="fa-solid fa-bolt text-black text-xl"></i>
                </div>
                <h1 class="font-game text-xl font-black text-yellow-500 italic tracking-tighter uppercase">DOSTLUK</h1>
            </div>
            <div class="hidden md:flex bg-green-500/10 text-green-500 border border-green-500/20 px-5 py-2.5 rounded-full text-[11px] font-black items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> OPERATOR ONLINE: 7/24
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-8 text-center">
        <div class="inline-block px-6 py-2 bg-yellow-500/10 border border-yellow-500/20 rounded-full mb-8">
            <span class="text-[10px] font-black text-yellow-500 tracking-[4px] uppercase">Verified Global Reseller 2026</span>
        </div>
        <h2 class="font-game text-5xl md:text-7xl font-black text-white italic uppercase mb-16 leading-tight">Dostluk<br><span class="text-yellow-500">PubgUcShop</span></h2>
        
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
            </div>
    </section>

    <div id="paymentModal">
        <div class="terminal animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="font-game text-lg text-yellow-500 italic uppercase">Töleg Terminaly</h3>
                    <p class="text-[9px] text-gray-500 tracking-widest uppercase">Official Secure Gateway</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition"><i class="fa-solid fa-xmark text-xl text-gray-500"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 text-left">
                    <p class="text-[9px] text-gray-500 uppercase mb-2">Satyjy Maglumatlary:</p>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center"><i class="fa-solid fa-shield-halved text-blue-500"></i></div>
                        <div>
                            <p id="tName" class="text-sm font-black text-white uppercase tracking-wider">AMAN HAYITMURADOV</p>
                            <p class="text-[9px] text-gray-500">Verified Merchant</p>
                        </div>
                    </div>
                </div>

                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 text-left">
                    <p class="text-[9px] text-gray-500 uppercase mb-2">IBAN NOMER:</p>
                    <div class="flex justify-between items-center gap-4">
                        <p id="tIban" class="text-[13px] font-mono font-bold text-yellow-500 tracking-wider">TR91 0015 7000 0000 0201 1511 63</p>
                        <button onclick="copyToClipboard('tIban')" class="bg-yellow-500/10 text-yellow-500 px-3 py-1.5 rounded-lg text-[9px] font-black hover:bg-yellow-500 hover:text-black transition uppercase">Göçür</button>
                    </div>
                </div>

                <div class="py-4">
                    <input type="number" id="playerID" placeholder="Meselem: 51234567" class="w-full bg-black/60 border border-white/10 text-white p-5 rounded-2xl text-center font-game text-xl focus:border-yellow-500 outline-none transition shadow-inner">
                    <p class="text-[9px] text-gray-500 mt-2 uppercase">Müşderi PUBG ID Belginiz</p>
                </div>

                <button onclick="sendWhatsApp()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl shadow-yellow-500/20 hover:scale-[1.02] active:scale-95 transition">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-white/5">
        <p class="text-[10px] text-gray-700 font-black tracking-[10px] uppercase">DostlukPubgUcShop Global 2026</p>
    </footer>

    <script>
        // Suratyň anyk açylmagy üçin GitHub Raw salgysy
        const ucImage = "https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/uc.png";

        const inventory = [
            { uc: "60", price: "40,50" }, { uc: "325", price: "202,50" }, { uc: "660", price: "405,00" },
            { uc: "1.800", price: "1.012,50" }, { uc: "3.850", price: "2.025,00" }, { uc: "8.100", price: "4.050,00" },
            { uc: "16.200", price: "8.100,00" }, { uc: "24.300", price: "12.150,00" }, { uc: "40.500", price: "20.250,00" }
        ];

        const market = document.getElementById('market');
        inventory.forEach((item, index) => {
            market.innerHTML += `
                <div class="uc-card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                    <div class="uc-img-container">
                        <img src="${ucImage}" alt="UC" class="uc-img" onerror="this.src='https://icons.iconarchive.com/icons/custom-icon-design/pretty-office-11/256/gem-icon.png'">
                    </div>
                    <h4 class="font-game text-2xl font-black text-white mb-6 tracking-tighter">${item.uc} PUBG UC</h4>
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl mb-8 border border-white/5">
                        <span class="text-[10px] text-gray-500 uppercase font-black">BAHA:</span>
                        <span class="text-xl font-black text-white italic">₺${item.price}</span>
                    </div>
                    <button onclick="openPay('${item.uc}', '${item.price}')" class="w-full bg-white/5 hover:bg-yellow-500 hover:text-black text-white border border-white/10 py-4 rounded-2xl text-[11px] font-black transition uppercase tracking-widest">SATYN AL</button>
                </div>
            `;
        });

        let currentUC = ""; let currentPrice = "";
        function openPay(uc, p) { currentUC = uc; currentPrice = p; document.getElementById('paymentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        function showToast(msg) {
            const t = document.getElementById('custom-toast');
            t.innerText = msg; t.style.display = 'block'; t.classList.add('animate__fadeInDown');
            setTimeout(() => {
                t.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
                setTimeout(() => { t.style.display = 'none'; t.classList.remove('animate__fadeOutUp'); }, 500);
            }, 2500);
        }

        function copyToClipboard(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            showToast("ÜSTÜNLIKLI GÖÇÜRILDI!");
        }

        function sendWhatsApp() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { showToast("ID BELGIŇIZI BARLAŇ!"); return; }
            const msg = `Salam! *DostlukPubgUcShop*%0A━━━━━━━━━━━━━━━━━%0A📦 Paket: *${currentUC} UC*%0A💰 Baha: *₺${currentPrice}*%0A🆔 Player ID: *${id}*%0A━━━━━━━━━━━━━━━━━%0ATöleg edildi, tassyklamagyňyza garaşýaryn!`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
