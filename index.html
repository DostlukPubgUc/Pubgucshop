<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DostlukPubgUcShop | Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        
        :root { --gold: #fbbf24; --dark-bg: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark-bg); color: #f8fafc; overflow-x: hidden; }
        .font-game { font-family: 'Orbitron', sans-serif; }

        /* Card Design */
        .uc-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 2.5rem;
            border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 2.5rem;
            transition: 0.4s;
            text-align: center;
        }
        .uc-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        /* Copy Action Style */
        .copy-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(251, 191, 36, 0.3);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .copy-box:active { transform: scale(0.95); background: rgba(251, 191, 36, 0.1); }
        .copy-label { font-size: 9px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* Modal */
        #paymentModal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .terminal {
            width: 100%; max-width: 450px;
            background: #0f172a; border: 1px solid var(--gold);
            border-radius: 3rem; padding: 2.5rem;
        }
    </style>
</head>
<body>

    <div class="w-full bg-slate-950 py-3 border-b border-white/5 text-center">
        <div class="inline-flex items-center gap-2 bg-green-500/10 text-green-500 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            Operator Online: 7/24
        </div>
    </div>

    <nav class="sticky top-0 w-full z-[1000] bg-slate-950/80 backdrop-blur-md py-5 px-8 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center shadow-lg shadow-yellow-500/20">
                    <i class="fa-solid fa-bolt text-black text-xl"></i>
                </div>
                <h1 class="font-game text-xl font-black text-yellow-500 italic uppercase">DOSTLUK</h1>
            </div>
        </div>
    </nav>

    <main class="pt-20 pb-20 px-8">
        <div class="text-center mb-16">
            <h2 class="font-game text-5xl font-black text-white italic uppercase leading-tight">Dostluk<br><span class="text-yellow-500">PubgUcShop</span></h2>
        </div>
        
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>
    </main>

    <div id="paymentModal">
        <div class="terminal">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-game text-lg text-yellow-500 italic uppercase">Töleg Terminaly</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-xl text-gray-500"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="copy-box" onclick="copyText('AMAN HAYITMURADOV', 'Adyňyz nusgalandy!')">
                    <span class="copy-label">Resmi Satyjy:</span>
                    <p class="text-white font-black tracking-widest uppercase">AMAN HAYITMURADOV</p>
                </div>

                <div class="copy-box" onclick="copyText('TR91 0015 7000 0000 0201 1511 63', 'Täze IBAN nusgalandy!')">
                    <span class="copy-label">IBAN Belgi (Töleg üçin):</span>
                    <p class="text-yellow-500 font-bold text-sm">TR91 0015 7000 0000 0201 1511 63</p>
                </div>

                <div class="py-2"></div>

                <input type="number" id="playerID" placeholder="ID belgiňizi ýazyň" class="w-full bg-black border border-white/10 text-white p-5 rounded-2xl text-center font-game text-xl outline-none focus:border-yellow-500">
                
                <button onclick="sendWhatsApp()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl shadow-yellow-500/10">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <script>
        const ucImg = "https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/516479509_1314959147297515_1216252998592852072_n.png";

        const inventory = [
            { uc: "60", price: "40,50" }, { uc: "325", price: "202,50" }, { uc: "660", price: "405,00" },
            { uc: "1.800", price: "1.012,50" }, { uc: "3.850", price: "2.025,00" }, { uc: "8.100", price: "4.050,00" },
            { uc: "16.200", price: "8.100,00" }, { uc: "24.300", price: "12.150,00" }, { uc: "40.500", price: "20.250,00" }
        ];

        const market = document.getElementById('market');
        inventory.forEach(item => {
            market.innerHTML += `
                <div class="uc-card">
                    <img src="${ucImg}" alt="UC" class="w-32 mx-auto mb-6" onerror="this.src='https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/uc.png'">
                    <h4 class="font-game text-2xl font-black text-white mb-6 italic uppercase">${item.uc} UC</h4>
                    <div class="bg-black/40 p-4 rounded-2xl mb-8 border border-white/5 flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Baha:</span>
                        <span class="text-xl font-black text-white italic font-game">₺${item.price}</span>
                    </div>
                    <button onclick="openPay('${item.uc}', '${item.price}')" class="w-full bg-white/5 hover:bg-yellow-500 hover:text-black text-white border border-white/10 py-4 rounded-2xl text-[11px] font-black transition uppercase tracking-widest">Satyn Al</button>
                </div>
            `;
        });

        let currentUC = ""; let currentPrice = "";
        function openPay(uc, p) { currentUC = uc; currentPrice = p; document.getElementById('paymentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

        function copyText(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                alert(message);
            });
        }

        function sendWhatsApp() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { alert("ID belgiňizi barlaň!"); return; }
            const msg = `Salam! DostlukPubgUcShop%0A Paket: ${currentUC} UC%0A Baha: ₺${currentPrice}%0A ID: ${id}`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
