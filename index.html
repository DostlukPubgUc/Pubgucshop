<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DostlukPubgUcShop | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap');
        
        :root { --gold: #fbbf24; --dark: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: #f8fafc; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        
        /* UC Kart dizaýny */
        .uc-card { background: #0f172a; border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; transition: 0.3s; position: relative; overflow: hidden; }
        .uc-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Surat bölümi - Anyk görkezmek üçin */
        .uc-img-box { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: rgba(255,255,255,0.02); border-radius: 1.5rem; }
        .uc-img { max-width: 130px; height: auto; filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3)); }

        /* Modal Dizaýny */
        #payModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .terminal { width: 100%; max-width: 420px; background: #0f172a; border: 2px solid var(--gold); border-radius: 2.5rem; padding: 30px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md py-4 px-6 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-yellow-500 rounded flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-black"></i>
                </div>
                <h1 class="font-game text-lg font-black text-yellow-500 italic">DOSTLUK</h1>
            </div>
            <span class="text-green-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online 7/24
            </span>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 max-w-7xl mx-auto text-center">
        <h2 class="font-game text-4xl font-black text-white italic mb-16 uppercase leading-tight">Dostluk<br><span class="text-yellow-500">PubgUcShop</span></h2>
        
        <div id="market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <div id="payModal">
        <div class="terminal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-game text-sm text-yellow-500 italic">TÖLEG TERMINALY</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-gray-500"></i></button>
            </div>
            <div class="space-y-4">
                <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                    <p class="text-[9px] text-gray-500 mb-1">SATYJY:</p>
                    <p class="text-xs font-black text-white uppercase tracking-wider">AMAN HAYITMURADOV</p>
                </div>
                <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                    <p class="text-[9px] text-gray-500 mb-1">IBAN NOMER:</p>
                    <p id="iban" class="text-[11px] font-mono font-bold text-yellow-500">TR91 0015 7000 0000 0201 1511 63</p>
                </div>
                <input type="number" id="playerID" placeholder="Player ID ýazyň" class="w-full bg-black border border-white/10 text-white p-4 rounded-xl text-center font-game outline-none focus:border-yellow-500 transition">
                <button onclick="sendWA()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-xs">TÖLEG ETDIM</button>
            </div>
        </div>
    </div>

    <script>
        // Suratyň dogry açylmagy üçin GitHub RAW salgysy
        const ucImgUrl = "https://raw.githubusercontent.com/DostlukPubgUc/Pubgucshop/main/uc.png";

        const packages = [
            { uc: "60", price: "40,50" }, { uc: "325", price: "202,50" }, { uc: "660", price: "405,00" },
            { uc: "1.800", price: "1.012,50" }, { uc: "3.850", price: "2.025,00" }, { uc: "8.100", price: "4.050,00" }
        ];

        const market = document.getElementById('market');
        packages.forEach(pkg => {
            market.innerHTML += `
                <div class="uc-card">
                    <div class="uc-img-box">
                        <img src="${ucImgUrl}" class="uc-img" alt="UC" onerror="this.src='https://icons.iconarchive.com/icons/custom-icon-design/pretty-office-11/256/gem-icon.png'">
                    </div>
                    <h4 class="font-game text-xl font-bold text-white mb-4">${pkg.uc} PUBG UC</h4>
                    <div class="flex justify-between items-center bg-black/30 p-3 rounded-lg mb-6">
                        <span class="text-[10px] text-gray-500 uppercase">Baha:</span>
                        <span class="text-white font-black italic">₺${pkg.price}</span>
                    </div>
                    <button onclick="openPay('${pkg.uc}', '${pkg.price}')" class="w-full bg-white/5 hover:bg-yellow-500 hover:text-black text-white border border-white/10 py-3 rounded-lg text-[10px] font-black transition uppercase">Satyn Al</button>
                </div>
            `;
        });

        let selUC = ""; let selP = "";
        function openPay(uc, p) { selUC = uc; selP = p; document.getElementById('payModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('payModal').style.display = 'none'; }

        function sendWA() {
            const id = document.getElementById('playerID').value;
            if(!id || id.length < 5) { alert("Dogry ID belgiňizi ýazyň!"); return; }
            const msg = `Salam! DostlukPubgUcShop:%0A📦 Paket: ${selUC} UC%0A💰 Baha: ₺${selP}%0A🆔 Player ID: ${id}`;
            window.open(`https://wa.me/905016873001?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
